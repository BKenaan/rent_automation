server {
    listen 80;
    listen [::]:80;
    server_name rentalman.online www.rentalman.online;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name rentalman.online www.rentalman.online;

    ssl_certificate     /etc/letsencrypt/live/rentalman.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rentalman.online/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                               always;
    add_header X-Frame-Options           "DENY"                                  always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"       always;

    # API — forward full path to uvicorn (no prefix stripping)
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        client_max_body_size  10M;
    }

    # Health check — no auth, no cache
    location = /health {
        proxy_pass       http://127.0.0.1:8000/health;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    # Hashed static assets — cache for 1 year
    location /assets/ {
        root /var/www/rent_automation/dist;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000";
        access_log off;
    }

    # Other static files (logo.svg, favicon, fonts)
    location ~* \.(svg|ico|png|webp|woff2|woff|ttf)$ {
        root /var/www/rent_automation/dist;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # SPA — always serve index.html, never cache it
    location / {
        root  /var/www/rent_automation/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        expires 0;
    }
}
