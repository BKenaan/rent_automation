services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    ports:
      - "127.0.0.1:5432:5432"   # local-only — not reachable from internet
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "127.0.0.1:8000:8000"   # local-only — Nginx proxies from 80/443
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    command: >
      bash -c "
        alembic upgrade head || true;
        python -c 'from app.db.session import engine, Base; import app.models; Base.metadata.create_all(bind=engine)';
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --timeout-keep-alive 30
      "

volumes:
  postgres_data:
